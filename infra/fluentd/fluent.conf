<source>
  @type tail
  path /var/log/plant/data.log
  pos_file /var/log/fluentd-buffers/data.log.pos
  tag plant.panel
  <parse>
    @type json
    time_key timestamp
    time_type string
    time_format %Y-%m-%dT%H:%M:%S.%N%z
  </parse>
  read_from_head true
  refresh_interval 1
</source>

<match plant.panel>
  @type elasticsearch
  host elasticsearch
  port 9200
  index_name plant-panel
  suppress_type_name true
  include_timestamp true

  <buffer>
    @type file
    path /var/log/fluentd-buffers/plant-panel
    flush_interval 1s
    retry_max_interval 30s
    retry_forever true
    chunk_limit_size 2M
    queue_limit_length 32
  </buffer>
</match>
